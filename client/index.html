<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模型评估 - 网络拆解系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>

<!-- ══════════════ 顶部导航 ══════════════ -->
<nav class="navbar navbar-dark bg-dark px-3" style="height:56px;">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary" id="sidebarToggle" title="展开/收起侧边栏">
            <i class="fas fa-bars"></i>
        </button>
        <span class="navbar-brand mb-0 h1 fs-6">
            <i class="fas fa-network-wired me-2"></i>网络拆解系统
        </span>
    </div>
    <div class="d-flex align-items-center" id="userBadge"></div>
</nav>

<!-- ══════════════ 主体布局 ══════════════ -->
<div class="app-layout">

    <!-- 侧边栏（内容由 sidebar.js 动态注入） -->
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav"></nav>
    </aside>

    <!-- 页面内容 -->
    <main class="main-content" id="mainContent">
        <div class="container-fluid mt-3 pb-4">
            <div class="row">

                <!-- ── 左面板 ── -->
                <div class="col-md-4">

                    <!-- 图输入 -->
                    <div class="card" id="graph-input">
                        <div class="card-header">
                            <h5><i class="fas fa-upload"></i> 图数据输入</h5>
                        </div>
                        <div class="card-body">
                            <ul class="nav nav-tabs mb-3" id="uploadModeTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="file-tab" data-bs-toggle="tab"
                                            data-bs-target="#file-upload" type="button" role="tab">
                                        <i class="fas fa-file-upload"></i> 上传文件
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="manual-tab" data-bs-toggle="tab"
                                            data-bs-target="#manual-input" type="button" role="tab">
                                        <i class="fas fa-edit"></i> 手动输入
                                    </button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="preset-tab" data-bs-toggle="tab"
                                            data-bs-target="#preset-generation" type="button" role="tab">
                                        <i class="fas fa-magic"></i> 预设图
                                    </button>
                                </li>
                            </ul>

                            <div class="tab-content" id="uploadModeContent">
                                <!-- 上传文件 -->
                                <div class="tab-pane fade show active" id="file-upload" role="tabpanel">
                                    <div class="mb-3">
                                        <label for="graphFile" class="form-label">选择图文件</label>
                                        <input type="file" class="form-control" id="graphFile"
                                               accept=".txt,.json,.gml,.graphml">
                                        <div class="form-text">支持格式：边列表 (.txt)、JSON、GML、GraphML</div>
                                    </div>
                                    <div class="upload-drop-zone" id="uploadDropZone">
                                        <div class="text-center p-4">
                                            <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                                            <p class="text-muted">拖拽图文件到此处，或点击浏览</p>
                                        </div>
                                    </div>
                                </div>

                                <!-- 手动输入 -->
                                <div class="tab-pane fade" id="manual-input" role="tabpanel">
                                    <div class="mb-3">
                                        <label for="graphInput" class="form-label">输入图数据</label>
                                        <textarea class="form-control" id="graphInput" rows="8"
                                            placeholder="每行输入一条边（两个节点ID，空格分隔）：&#10;0 1&#10;1 2&#10;2 3&#10;..."></textarea>
                                        <div class="form-text">格式：每行两个节点ID，用空格或制表符分隔</div>
                                    </div>
                                    <div id="manualInputFeedback" class="d-none">
                                        <div class="alert alert-info">
                                            <small>
                                                <strong>预览：</strong>
                                                已检测到 <span id="edgeCount">0</span> 条边，
                                                <span id="nodeCount">0</span> 个节点
                                            </small>
                                        </div>
                                    </div>
                                </div>

                                <!-- 预设图 -->
                                <div class="tab-pane fade" id="preset-generation" role="tabpanel">
                                    <div class="mb-3">
                                        <label for="presetType" class="form-label">图类型</label>
                                        <select class="form-select" id="presetType">
                                            <option value="">请选择图类型...</option>
                                            <option value="barabasi_albert">Barabási-Albert (Scale-free)</option>
                                            <option value="erdos_renyi">Erdős-Rényi (Random)</option>
                                        </select>
                                    </div>
                                    <div id="presetParameters"></div>
                                    <div class="d-grid">
                                        <button class="btn btn-primary" id="generatePresetBtn" disabled>
                                            <i class="fas fa-magic"></i> 生成图
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div id="graphInfo" class="alert alert-info d-none mt-3">
                                <h6>图信息：</h6>
                                <div id="graphStats"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 图统计 -->
                    <div id="graph-statistics-container" class="mt-3"></div>

                    <!-- 模型配置 -->
                    <div class="card mt-3" id="model-selection">
                        <div class="card-header">
                            <h5><i class="fas fa-cogs"></i> 模型配置</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="modelSelect" class="form-label">选择模型</label>
                                <select class="form-select" id="modelSelect">
                                    <option value="default">加载模型中...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="stepRatio" class="form-label">步长比例</label>
                                <input type="number" class="form-control" id="stepRatio"
                                       value="0.0025" min="0.001" max="1" step="0.001">
                                <div class="form-text">每次迭代考虑的节点比例</div>
                            </div>
                            <div class="mb-3">
                                <label for="maxIterations" class="form-label">最大迭代次数</label>
                                <input type="number" class="form-control" id="maxIterations"
                                       value="1000" min="100" max="10000" step="100">
                            </div>
                            <div class="d-grid gap-2">
                                <button class="btn btn-primary" id="dismantleBtn" disabled>
                                    <i class="fas fa-play"></i> 开始拆解
                                </button>
                                <button class="btn btn-secondary" id="clearBtn">
                                    <i class="fas fa-trash"></i> 清除
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 进度 -->
                    <div class="card mt-3" id="progressCard" style="display:none;">
                        <div class="card-header">
                            <h6><i class="fas fa-spinner fa-spin"></i> 处理中</h6>
                        </div>
                        <div class="card-body">
                            <div class="progress mb-2">
                                <div class="progress-bar progress-bar-striped progress-bar-animated"
                                     id="progressBar" style="width:0%"></div>
                            </div>
                            <div id="progressText">初始化中...</div>
                        </div>
                    </div>
                </div>

                <!-- ── 右面板 ── -->
                <div class="col-md-8">

                    <!-- 图可视化 -->
                    <div class="card" id="graph-visualization">
                        <div class="card-header">
                            <h5><i class="fas fa-project-diagram"></i> 图可视化</h5>
                        </div>
                        <div class="card-body">
                            <div id="graphViz" style="height:400px;border:1px solid #ddd;"></div>
                        </div>
                    </div>

                    <!-- 多视图可视化 -->
                    <div id="multi-view-visualization" class="mt-3"></div>

                    <!-- 进度控制 -->
                    <div id="progress-control" class="mt-3"></div>

                    <!-- 拆解进度图表 -->
                    <div class="card mt-3" id="dismantlingChartCard" style="display:none;">
                        <div class="card-header">
                            <h5><i class="fas fa-chart-line"></i> 网络拆解进度</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="dismantlingChart" height="120"></canvas>
                        </div>
                    </div>

                    <!-- 结果 -->
                    <div class="card mt-3" id="resultsCard" style="display:none;">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <h5 class="mb-0"><i class="fas fa-table"></i> 拆解结果</h5>
                            <div>
                                <button class="btn btn-outline-primary btn-sm" id="exportSolution">
                                    <i class="fas fa-download"></i> 导出方案
                                </button>
                                <button class="btn btn-outline-secondary btn-sm ms-1" id="exportResults">
                                    <i class="fas fa-file-export"></i> 导出 JSON
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="modelStatsTable" class="mb-3"></div>
                            <div id="removalSequenceSection">
                                <h6>节点移除序列：</h6>
                                <ul class="nav nav-tabs mb-2" id="removalTabs" role="tablist"></ul>
                                <div class="tab-content" id="removalTabContent"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<!-- 连接状态浮标 -->
<div id="server-status" class="server-status-badge">
    <i class="fas fa-circle text-secondary"></i> 连接中...
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils/auth.js"></script>
<script>
    Auth.requireLogin();
    Auth.renderUserBadge('userBadge');
</script>
<script src="js/config.js"></script>
<script src="js/core/EventBus.js"></script>
<script src="js/core/ComponentManager.js"></script>
<script src="js/core/BaseComponent.js"></script>
<script src="js/utils/api.js"></script>
<script src="js/components/GraphUploadComponent.js"></script>
<script src="js/components/GraphStatisticsComponent.js"></script>
<script src="js/components/SimpleVisualizationComponent.js"></script>
<script src="js/components/MultiViewVisualizationComponent.js"></script>
<script src="js/components/ProgressControlComponent.js"></script>
<script src="js/components/ModelSelectionComponent.js"></script>
<script src="app.js"></script>
<script src="js/sidebar.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理控制台 - 网络拆解系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="sidebar.css">
    <style>
        .stat-card {
            background: linear-gradient(135deg, #1e2130, #2a2f45);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 1.25rem;
            color: #fff; text-align: center;
        }
        .stat-card .val { font-size: 2rem; font-weight: 700; color: #a5b4fc; }
        .stat-card .lbl { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 4px; }
        .stat-card .icon { font-size: 1.5rem; margin-bottom: 0.5rem; opacity: 0.6; }
        .section-card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .section-card .card-header { background: #fff; border-bottom: 1px solid #e9ecef; font-weight: 600; }
        .badge-role-admin { background: #ffc107; color: #000; }
        .badge-role-user  { background: #0dcaf0; color: #000; }
        .badge-status-active   { background: #198754; }
        .badge-status-disabled { background: #6c757d; }
        .log-table td, .log-table th { font-size: 0.82rem; vertical-align: middle; }
        .health-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
        .health-dot.ok  { background: #28a745; box-shadow: 0 0 6px #28a745; }
        .health-dot.err { background: #dc3545; }
        .modal-dark .modal-content {
            background: #1e2130; color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal-dark .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal-dark .modal-footer { border-top: 1px solid rgba(255,255,255,0.1); }
        .modal-dark .form-control, .modal-dark .form-select {
            background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: #fff;
        }
        .modal-dark .form-control:focus, .modal-dark .form-select:focus {
            background: rgba(255,255,255,0.12); border-color: #667eea; color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.3);
        }
        .modal-dark .form-label { color: rgba(255,255,255,0.7); }
        .modal-dark .btn-close { filter: invert(1); }
        .modal-dark select option { background: #1e2130; }
    </style>
</head>
<body>

<!-- 顶部导航 -->
<nav class="navbar navbar-dark bg-dark px-3" style="height:56px;">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <span class="navbar-brand mb-0 h1 fs-6">
            <i class="fas fa-network-wired me-2"></i>网络拆解系统
        </span>
    </div>
    <div class="d-flex align-items-center" id="userBadge"></div>
</nav>

<div class="app-layout">
    <!-- 侧边栏（内容由 sidebar.js 动态注入） -->
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav"></nav>
    </aside>

    <main class="main-content">
        <div class="container-fluid mt-3 pb-4">

            <!-- 页面标题 -->
            <div class="d-flex align-items-center justify-content-between mb-3">
                <div>
                    <h5 class="mb-0"><i class="fas fa-shield-alt me-2 text-warning"></i>管理控制台</h5>
                    <small class="text-muted">系统监控、用户管理与操作日志</small>
                </div>
                <button class="btn btn-sm btn-outline-secondary" onclick="refreshAll()">
                    <i class="fas fa-sync me-1"></i>刷新
                </button>
            </div>

            <!-- 系统状态卡片 -->
            <div class="row g-3 mb-4" id="statsRow">
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-users"></i></div>
                        <div class="val" id="statUsers">—</div>
                        <div class="lbl">注册用户</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-plug"></i></div>
                        <div class="val" id="statSessions">—</div>
                        <div class="lbl">活跃会话</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-robot"></i></div>
                        <div class="val" id="statModels">—</div>
                        <div class="lbl">可用模型</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="icon"><i class="fas fa-server"></i></div>
                        <div class="val" id="statHealth">
                            <span class="health-dot err" id="healthDot"></span>
                        </div>
                        <div class="lbl" id="statHealthLabel">检测中...</div>
                    </div>
                </div>
            </div>

            <div class="row g-3">

                <!-- ══ 左列：用户管理 ══ -->
                <div class="col-lg-7">
                    <div class="card section-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-users me-2 text-primary"></i>用户管理</span>
                            <button class="btn btn-sm btn-primary" onclick="openAddUser()">
                                <i class="fas fa-plus me-1"></i>新增用户
                            </button>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0 align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>用户名</th>
                                            <th>角色</th>
                                            <th>邮箱</th>
                                            <th>最后登录</th>
                                            <th>状态</th>
                                            <th>操作</th>
                                        </tr>
                                    </thead>
                                    <tbody id="userTableBody">
                                        <tr><td colspan="6" class="text-center text-muted py-4">加载中...</td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ══ 右列：系统信息 + 操作日志 ══ -->
                <div class="col-lg-5">

                    <!-- 系统信息 -->
                    <div class="card section-card mb-3">
                        <div class="card-header"><i class="fas fa-info-circle me-2 text-primary"></i>系统信息</div>
                        <div class="card-body">
                            <table class="table table-sm mb-0">
                                <tbody id="sysInfoTable">
                                    <tr><td class="text-muted">服务器时间</td><td id="siTime">—</td></tr>
                                    <tr><td class="text-muted">运行状态</td><td id="siUptime">—</td></tr>
                                    <tr><td class="text-muted">活跃会话</td><td id="siSessions">—</td></tr>
                                    <tr><td class="text-muted">可用模型</td><td id="siModels">—</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- 操作日志 -->
                    <div class="card section-card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <span><i class="fas fa-history me-2 text-primary"></i>操作日志</span>
                            <button class="btn btn-sm btn-outline-secondary" onclick="loadLogs()">
                                <i class="fas fa-sync"></i>
                            </button>
                        </div>
                        <div class="card-body p-0" style="max-height:320px;overflow-y:auto;">
                            <table class="table table-sm log-table mb-0">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>时间</th>
                                        <th>用户</th>
                                        <th>操作</th>
                                        <th>详情</th>
                                    </tr>
                                </thead>
                                <tbody id="logTableBody">
                                    <tr><td colspan="4" class="text-center text-muted py-3">加载中...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<!-- 新增用户 Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dark">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>新增用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="addUserError" class="alert alert-danger d-none"></div>
                <div class="mb-3">
                    <label class="form-label">用户名 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="newUsername" placeholder="请输入用户名">
                </div>
                <div class="mb-3">
                    <label class="form-label">密码 <span class="text-danger">*</span></label>
                    <input type="password" class="form-control" id="newPassword" placeholder="请输入密码">
                </div>
                <div class="mb-3">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-control" id="newEmail" placeholder="可选">
                </div>
                <div class="mb-3">
                    <label class="form-label">角色</label>
                    <select class="form-select" id="newRole">
                        <option value="user">普通用户</option>
                        <option value="superadmin">超级管理员</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitAddUser()">
                    <i class="fas fa-save me-1"></i>创建
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils/auth.js"></script>
<script>
Auth.requireAdmin();
Auth.renderUserBadge('userBadge');
</script>
<script src="js/sidebar.js"></script>
<script>
const API = Auth.SERVER_URL;

async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
        headers: Auth.authHeaders(),
        ...opts
    });
    return res.json();
}

// ── 系统状态 ──────────────────────────────────
async function loadStats() {
    try {
        const data = await apiFetch('/api/system/stats');
        if (!data.success) return;
        const s = data.stats;
        document.getElementById('statUsers').textContent    = s.total_users;
        document.getElementById('statSessions').textContent = s.active_sessions;
        document.getElementById('statModels').textContent   = s.total_models;
        document.getElementById('siTime').textContent       = s.server_time;
        document.getElementById('siUptime').textContent     = s.uptime;
        document.getElementById('siSessions').textContent   = s.active_sessions;
        document.getElementById('siModels').textContent     = s.total_models;

        const dot = document.getElementById('healthDot');
        dot.className = 'health-dot ok';
        document.getElementById('statHealth').innerHTML = '<span class="health-dot ok" id="healthDot"></span>';
        document.getElementById('statHealthLabel').textContent = '运行正常';
    } catch {
        document.getElementById('statHealthLabel').textContent = '连接失败';
    }
}

// ── 用户列表 ──────────────────────────────────
async function loadUsers() {
    const tbody = document.getElementById('userTableBody');
    try {
        const data = await apiFetch('/api/admin/users');
        if (!data.success) { tbody.innerHTML = `<tr><td colspan="6" class="text-danger text-center">${data.error}</td></tr>`; return; }
        tbody.innerHTML = data.users.map(u => `
            <tr>
                <td><i class="fas fa-user-circle me-1 text-muted"></i>${u.username}</td>
                <td><span class="badge badge-role-${u.role === 'superadmin' ? 'admin' : 'user'}">
                    ${u.role === 'superadmin' ? '管理员' : '普通用户'}</span></td>
                <td class="text-muted" style="font-size:0.82rem">${u.email || '—'}</td>
                <td class="text-muted" style="font-size:0.82rem">${u.last_login || '从未'}</td>
                <td><span class="badge badge-status-${u.status}">${u.status === 'active' ? '正常' : '禁用'}</span></td>
                <td>
                    <button class="btn btn-xs btn-outline-warning me-1" title="${u.status === 'active' ? '禁用' : '启用'}"
                            onclick="toggleUser('${u.id}', this)" style="padding:2px 7px;font-size:0.75rem">
                        <i class="fas fa-${u.status === 'active' ? 'ban' : 'check'}"></i>
                    </button>
                    <button class="btn btn-xs btn-outline-danger" title="删除"
                            onclick="deleteUser('${u.id}', '${u.username}')" style="padding:2px 7px;font-size:0.75rem">
                        <i class="fas fa-trash"></i>
                    </button>
                </td>
            </tr>`).join('');
    } catch {
        tbody.innerHTML = '<tr><td colspan="6" class="text-danger text-center">加载失败，请确认后端已启动</td></tr>';
    }
}

async function toggleUser(uid, btn) {
    const data = await apiFetch(`/api/admin/users/${uid}/toggle`, { method: 'POST' });
    if (data.success) loadUsers();
    else alert(data.error);
}

async function deleteUser(uid, username) {
    if (!confirm(`确认删除用户 "${username}"？此操作不可撤销。`)) return;
    const data = await apiFetch(`/api/admin/users/${uid}`, { method: 'DELETE' });
    if (data.success) { loadUsers(); loadStats(); }
    else alert(data.error);
}

// ── 新增用户 ──────────────────────────────────
let addModal;
function openAddUser() {
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newRole').value = 'user';
    document.getElementById('addUserError').classList.add('d-none');
    addModal = addModal || new bootstrap.Modal(document.getElementById('addUserModal'));
    addModal.show();
}

async function submitAddUser() {
    const username = document.getElementById('newUsername').value.trim();
    const password = document.getElementById('newPassword').value;
    const email    = document.getElementById('newEmail').value.trim();
    const role     = document.getElementById('newRole').value;
    const errEl    = document.getElementById('addUserError');

    if (!username || !password) {
        errEl.textContent = '用户名和密码不能为空';
        errEl.classList.remove('d-none');
        return;
    }

    const data = await apiFetch('/api/admin/users', {
        method: 'POST',
        body: JSON.stringify({ username, password, email, role })
    });

    if (data.success) {
        addModal.hide();
        loadUsers(); loadStats();
    } else {
        errEl.textContent = data.error || '创建失败';
        errEl.classList.remove('d-none');
    }
}

// ── 操作日志 ──────────────────────────────────
async function loadLogs() {
    const tbody = document.getElementById('logTableBody');
    try {
        const data = await apiFetch('/api/admin/logs');
        if (!data.success) return;
        if (!data.logs.length) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">暂无日志</td></tr>';
            return;
        }
        tbody.innerHTML = data.logs.map(l => `
            <tr>
                <td class="text-muted">${l.time}</td>
                <td>${l.username}</td>
                <td><span class="badge bg-secondary">${l.action}</span></td>
                <td class="text-muted">${l.detail || '—'}</td>
            </tr>`).join('');
    } catch {
        tbody.innerHTML = '<tr><td colspan="4" class="text-danger text-center">加载失败</td></tr>';
    }
}

function refreshAll() { loadStats(); loadUsers(); loadLogs(); }

// 初始化
refreshAll();
// 每 30 秒自动刷新状态
setInterval(loadStats, 30000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人信息 - 网络拆解系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="sidebar.css">
    <style>
        .section-card { border: none; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .section-card .card-header { background: #fff; border-bottom: 1px solid #e9ecef; font-weight: 600; }
        .avatar-wrap {
            width: 72px; height: 72px; border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: #fff; font-weight: 700;
        }
        .record-item {
            background: #f8f9fa; border-radius: 8px; padding: 0.75rem 1rem;
            border: 1px solid #e9ecef; margin-bottom: 0.5rem;
        }
        .record-item:hover { border-color: #667eea; }
        .record-item .record-title { font-weight: 600; font-size: 0.88rem; }
        .record-item .record-meta  { font-size: 0.78rem; color: #6c757d; }
        .tag { display: inline-block; padding: 1px 7px; border-radius: 10px;
               font-size: 0.72rem; font-weight: 600; }
        .tag-sac  { background: #e0e7ff; color: #4338ca; }
        .tag-dqn  { background: #dcfce7; color: #166534; }
        .tag-eval { background: #fef9c3; color: #854d0e; }
        .empty-hint { text-align: center; color: #adb5bd; padding: 2rem 0; }
        .empty-hint i { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
        .nav-tabs .nav-link { font-size: 0.875rem; }
        .dataset-tag { display: inline-block; background: #e0f2fe; color: #0369a1;
                       border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; margin: 1px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3" style="height:56px;">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary" id="sidebarToggle">
            <i class="fas fa-bars"></i>
        </button>
        <span class="navbar-brand mb-0 h1 fs-6">
            <i class="fas fa-network-wired me-2"></i>网络拆解系统
        </span>
    </div>
    <div class="d-flex align-items-center" id="userBadge"></div>
</nav>

<div class="app-layout">
    <aside class="sidebar" id="sidebar">
        <nav class="sidebar-nav"></nav>
    </aside>

    <main class="main-content">
        <div class="container-fluid mt-3 pb-4">

            <div class="d-flex align-items-center mb-3">
                <h5 class="mb-0"><i class="fas fa-user-circle me-2 text-primary"></i>个人信息</h5>
            </div>

            <div class="row g-3">

                <!-- ══ 左列：用户信息 ══ -->
                <div class="col-lg-3">
                    <div class="card section-card mb-3">
                        <div class="card-body text-center py-4">
                            <div class="avatar-wrap mx-auto mb-3" id="avatarEl">U</div>
                            <div class="fw-bold fs-5" id="profileName">—</div>
                            <div class="text-muted small" id="profileRole">—</div>
                            <div class="text-muted small mt-1" id="profileEmail">—</div>
                        </div>
                    </div>

                    <!-- 修改密码 -->
                    <div class="card section-card">
                        <div class="card-header"><i class="fas fa-key me-2 text-primary"></i>修改密码</div>
                        <div class="card-body">
                            <div id="pwdMsg" class="d-none mb-2"></div>
                            <div class="mb-2">
                                <input type="password" class="form-control form-control-sm" id="oldPwd" placeholder="当前密码">
                            </div>
                            <div class="mb-2">
                                <input type="password" class="form-control form-control-sm" id="newPwd" placeholder="新密码（至少6位）">
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control form-control-sm" id="confirmPwd" placeholder="确认新密码">
                            </div>
                            <button class="btn btn-sm btn-primary w-100" onclick="changePwd()">
                                <i class="fas fa-save me-1"></i>保存修改
                            </button>
                        </div>
                    </div>
                </div>

                <!-- ══ 右列：记录 ══ -->
                <div class="col-lg-9">
                    <div class="card section-card">
                        <div class="card-header">
                            <ul class="nav nav-tabs card-header-tabs" id="profileTabs">
                                <li class="nav-item">
                                    <button class="nav-link active" onclick="switchTab('train', this)">
                                        <i class="fas fa-brain me-1"></i>训练记录
                                    </button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link" onclick="switchTab('models', this)">
                                        <i class="fas fa-robot me-1"></i>模型记录
                                    </button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link" onclick="switchTab('eval', this)">
                                        <i class="fas fa-flask me-1"></i>评估历史
                                    </button>
                                </li>
                                <li class="nav-item">
                                    <button class="nav-link" onclick="switchTab('datasets', this)">
                                        <i class="fas fa-database me-1"></i>数据集管理
                                    </button>
                                </li>
                            </ul>
                        </div>
                        <div class="card-body">

                            <!-- 训练记录 -->
                            <div id="tab-train">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small class="text-muted">共 <span id="trainCount">0</span> 条记录</small>
                                    <button class="btn btn-sm btn-outline-danger" onclick="clearRecords('nd_train_records', 'trainCount', renderTrainRecords)">
                                        <i class="fas fa-trash"></i> 清空
                                    </button>
                                </div>
                                <div id="trainRecordList"></div>
                            </div>

                            <!-- 模型记录 -->
                            <div id="tab-models" style="display:none">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small class="text-muted">共 <span id="modelCount">0</span> 条记录</small>
                                    <button class="btn btn-sm btn-outline-danger" onclick="clearRecords('nd_model_records', 'modelCount', renderModelRecords)">
                                        <i class="fas fa-trash"></i> 清空
                                    </button>
                                </div>
                                <div id="modelRecordList"></div>
                            </div>

                            <!-- 评估历史 -->
                            <div id="tab-eval" style="display:none">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small class="text-muted">共 <span id="evalCount">0</span> 条记录</small>
                                    <button class="btn btn-sm btn-outline-danger" onclick="clearRecords('nd_eval_records', 'evalCount', renderEvalRecords)">
                                        <i class="fas fa-trash"></i> 清空
                                    </button>
                                </div>
                                <div id="evalRecordList"></div>
                            </div>

                            <!-- 数据集管理 -->
                            <div id="tab-datasets" style="display:none">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <small class="text-muted">已保存的数据集配置</small>
                                    <button class="btn btn-sm btn-outline-danger" onclick="clearDatasetConfigs()">
                                        <i class="fas fa-trash"></i> 清空全部
                                    </button>
                                </div>
                                <div id="datasetConfigList"></div>
                            </div>

                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils/auth.js"></script>
<script>
Auth.requireLogin();
Auth.renderUserBadge('userBadge');
</script>
<script src="js/sidebar.js"></script>
<script>
// ── 用户信息 ──────────────────────────────────
const user = Auth.getUser();
if (user) {
    document.getElementById('profileName').textContent = user.username;
    document.getElementById('profileRole').textContent = user.role === 'superadmin' ? '超级管理员' : '普通用户';
    document.getElementById('avatarEl').textContent = user.username[0].toUpperCase();
}

// 从后端拉取邮箱
fetch(`${Auth.SERVER_URL}/api/auth/me`, { headers: Auth.authHeaders() })
    .then(r => r.json()).then(d => {
        if (d.success) document.getElementById('profileEmail').textContent = d.email || '未设置邮箱';
    }).catch(() => {});

// ── 修改密码（模拟：本地验证后更新 localStorage 中的演示账号） ──
async function changePwd() {
    const oldPwd = document.getElementById('oldPwd').value;
    const newPwd = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmPwd').value;
    const msgEl = document.getElementById('pwdMsg');

    const show = (msg, type) => {
        msgEl.className = `alert alert-${type} py-1 px-2 small`;
        msgEl.textContent = msg;
        msgEl.classList.remove('d-none');
    };

    if (!oldPwd || !newPwd) { show('请填写所有字段', 'danger'); return; }
    if (newPwd.length < 6)  { show('新密码至少6位', 'danger'); return; }
    if (newPwd !== confirmPwd) { show('两次密码不一致', 'danger'); return; }

    try {
        const res = await fetch(`${Auth.SERVER_URL}/api/auth/change_password`, {
            method: 'POST',
            headers: Auth.authHeaders(),
            body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
        });
        const data = await res.json();
        if (data.success) {
            show('密码修改成功', 'success');
            document.getElementById('oldPwd').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('confirmPwd').value = '';
        } else {
            show(data.error || '修改失败', 'danger');
        }
    } catch {
        show('无法连接服务器', 'danger');
    }
}

// ── Tab 切换 ──────────────────────────────────
function switchTab(name, btn) {
    ['train', 'models', 'eval', 'datasets'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
    });
    document.querySelectorAll('#profileTabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// ── 通用清空 ──────────────────────────────────
function clearRecords(key, countId, renderFn) {
    if (!confirm('确认清空所有记录？')) return;
    localStorage.removeItem(key);
    renderFn();
}

// ── 训练记录 ──────────────────────────────────
function renderTrainRecords() {
    const records = JSON.parse(localStorage.getItem('nd_train_records') || '[]');
    document.getElementById('trainCount').textContent = records.length;
    const el = document.getElementById('trainRecordList');
    if (!records.length) {
        el.innerHTML = '<div class="empty-hint"><i class="fas fa-inbox"></i>暂无训练记录</div>';
        return;
    }
    el.innerHTML = records.slice().reverse().map((r, i) => `
        <div class="record-item">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="record-title">
                        <span class="tag tag-${r.algo?.startsWith('sac') ? 'sac' : 'dqn'}">${(r.algo || '').toUpperCase()}</span>
                        &nbsp;${r.expName || '未命名实验'}
                    </div>
                    <div class="record-meta mt-1">
                        GNN: ${r.gnn || '—'} &nbsp;|&nbsp;
                        lr: ${r.lr || '—'} &nbsp;|&nbsp;
                        steps: ${r.totalSteps?.toLocaleString() || '—'} &nbsp;|&nbsp;
                        batch: ${r.batchSize || '—'}
                    </div>
                    <div class="record-meta">
                        数据集: ${(r.datasets || []).map(d => `<span class="dataset-tag">${d}</span>`).join(' ')}
                    </div>
                </div>
                <div class="text-end">
                    <small class="text-muted">${r.date || ''}</small><br>
                    <button class="btn btn-xs btn-outline-danger mt-1" style="padding:1px 6px;font-size:0.72rem"
                            onclick="deleteRecord('nd_train_records', ${records.length - 1 - i}, renderTrainRecords)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>`).join('');
}

// ── 模型记录 ──────────────────────────────────
function renderModelRecords() {
    const records = JSON.parse(localStorage.getItem('nd_model_records') || '[]');
    document.getElementById('modelCount').textContent = records.length;
    const el = document.getElementById('modelRecordList');
    if (!records.length) {
        el.innerHTML = '<div class="empty-hint"><i class="fas fa-robot"></i>暂无模型记录</div>';
        return;
    }
    el.innerHTML = records.slice().reverse().map((r, i) => `
        <div class="record-item">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="record-title">
                        <i class="fas fa-file-archive text-primary me-1"></i>${r.name || '未命名'}
                    </div>
                    <div class="record-meta mt-1">
                        算法: ${r.algo || '—'} &nbsp;|&nbsp; GNN: ${r.gnn || '—'} &nbsp;|&nbsp;
                        步数: ${r.step?.toLocaleString() || '—'} &nbsp;|&nbsp; AUC: ${r.auc || '—'}
                    </div>
                </div>
                <div class="text-end">
                    <small class="text-muted">${r.date || ''}</small><br>
                    <button class="btn btn-xs btn-outline-danger mt-1" style="padding:1px 6px;font-size:0.72rem"
                            onclick="deleteRecord('nd_model_records', ${records.length - 1 - i}, renderModelRecords)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>`).join('');
}

// ── 评估历史 ──────────────────────────────────
function renderEvalRecords() {
    const records = JSON.parse(localStorage.getItem('nd_eval_records') || '[]');
    document.getElementById('evalCount').textContent = records.length;
    const el = document.getElementById('evalRecordList');
    if (!records.length) {
        el.innerHTML = '<div class="empty-hint"><i class="fas fa-flask"></i>暂无评估记录</div>';
        return;
    }
    el.innerHTML = records.slice().reverse().map((r, i) => `
        <div class="record-item">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <div class="record-title">
                        <span class="tag tag-eval">评估</span>
                        &nbsp;${r.graphName || '未命名图'}
                    </div>
                    <div class="record-meta mt-1">
                        模型: ${r.model || '—'} &nbsp;|&nbsp;
                        节点: ${r.nodes || '—'} &nbsp;|&nbsp;
                        边: ${r.edges || '—'} &nbsp;|&nbsp;
                        鲁棒性: ${r.robustness || '—'}
                    </div>
                </div>
                <div class="text-end">
                    <small class="text-muted">${r.date || ''}</small><br>
                    <button class="btn btn-xs btn-outline-danger mt-1" style="padding:1px 6px;font-size:0.72rem"
                            onclick="deleteRecord('nd_eval_records', ${records.length - 1 - i}, renderEvalRecords)">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
        </div>`).join('');
}

// ── 数据集配置管理 ──────────────────────────────
function renderDatasetConfigs() {
    const saved = JSON.parse(localStorage.getItem('nd_dataset_configs') || '{}');
    const keys = Object.keys(saved);
    const el = document.getElementById('datasetConfigList');
    if (!keys.length) {
        el.innerHTML = '<div class="empty-hint"><i class="fas fa-database"></i>暂无已保存的数据集配置</div>';
        return;
    }
    el.innerHTML = keys.map(name => `
        <div class="record-item">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="record-title"><i class="fas fa-layer-group text-primary me-1"></i>${name}</div>
                    <div class="record-meta mt-1">
                        ${saved[name].configs.map(c => `<span class="dataset-tag">${c.type} ×${c.count}</span>`).join(' ')}
                        &nbsp;|&nbsp; 保存于 ${saved[name].savedAt || '—'}
                    </div>
                </div>
                <button class="btn btn-xs btn-outline-danger" style="padding:2px 8px;font-size:0.75rem"
                        onclick="deleteDatasetConfig('${name}')">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>`).join('');
}

function deleteDatasetConfig(name) {
    if (!confirm(`确认删除数据集配置 "${name}"？`)) return;
    const saved = JSON.parse(localStorage.getItem('nd_dataset_configs') || '{}');
    delete saved[name];
    localStorage.setItem('nd_dataset_configs', JSON.stringify(saved));
    renderDatasetConfigs();
}

function clearDatasetConfigs() {
    if (!confirm('确认清空所有数据集配置？')) return;
    localStorage.removeItem('nd_dataset_configs');
    renderDatasetConfigs();
}

function deleteRecord(key, idx, renderFn) {
    const records = JSON.parse(localStorage.getItem(key) || '[]');
    records.splice(idx, 1);
    localStorage.setItem(key, JSON.stringify(records));
    renderFn();
}

// ── 初始化 ──────────────────────────────────
renderTrainRecords();
renderModelRecords();
renderEvalRecords();
renderDatasetConfigs();
</script>
</body>
</html>

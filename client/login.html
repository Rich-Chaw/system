<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 网络拆解系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            width: 420px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .login-logo {
            text-align: center; margin-bottom: 2rem;
        }
        .login-logo .icon-wrap {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%; display: inline-flex;
            align-items: center; justify-content: center;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(102,126,234,0.4);
        }
        .login-logo h4 { color: #fff; font-weight: 700; margin: 0; }
        .login-logo p  { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin: 0; }
        .role-selector { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
        .role-btn {
            flex: 1; padding: 0.75rem;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px; background: transparent;
            color: rgba(255,255,255,0.6); cursor: pointer;
            transition: all 0.25s; text-align: center; font-size: 0.875rem;
        }
        .role-btn:hover { border-color: #667eea; color: #fff; }
        .role-btn.active {
            border-color: #667eea;
            background: rgba(102,126,234,0.2);
            color: #fff; font-weight: 600;
        }
        .role-btn i { display: block; font-size: 1.5rem; margin-bottom: 0.4rem; }
        .form-control-dark {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff; border-radius: 8px;
            padding: 0.75rem 1rem;
        }
        .form-control-dark:focus {
            background: rgba(255,255,255,0.12);
            border-color: #667eea;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.3);
        }
        .form-control-dark::placeholder { color: rgba(255,255,255,0.35); }
        .form-label-dark { color: rgba(255,255,255,0.7); font-size: 0.875rem; margin-bottom: 0.4rem; }
        .btn-login {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 8px;
            color: #fff; font-weight: 600; font-size: 1rem;
            transition: all 0.25s; margin-top: 0.5rem;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn-login:disabled { opacity: 0.6; transform: none; }
        .demo-hint {
            margin-top: 1.5rem; padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 8px; border-left: 3px solid #667eea;
        }
        .demo-hint p { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin: 0; line-height: 1.8; }
        .demo-hint strong { color: rgba(255,255,255,0.75); }
        .alert-dark-danger {
            background: rgba(220,53,69,0.2); border: 1px solid rgba(220,53,69,0.4);
            color: #ff8a8a; border-radius: 8px; padding: 0.75rem 1rem;
            font-size: 0.875rem; display: none;
        }
        .alert-dark-success {
            background: rgba(40,167,69,0.2); border: 1px solid rgba(40,167,69,0.4);
            color: #75dd8a; border-radius: 8px; padding: 0.75rem 1rem;
            font-size: 0.875rem; display: none;
        }
        .input-group-dark .input-group-text {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-right: none; color: rgba(255,255,255,0.5);
        }
        .input-group-dark .form-control-dark { border-left: none; }
        .tab-switch {
            display: flex; gap: 0; margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.06); border-radius: 8px; padding: 4px;
        }
        .tab-switch button {
            flex: 1; padding: 0.5rem; border: none; border-radius: 6px;
            background: transparent; color: rgba(255,255,255,0.5);
            font-size: 0.875rem; cursor: pointer; transition: all 0.2s;
        }
        .tab-switch button.active {
            background: rgba(102,126,234,0.35); color: #fff; font-weight: 600;
        }
        #registerSection { display: none; }
        #registerLink { display: none; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="login-logo">
        <div class="icon-wrap">
            <i class="fas fa-network-wired fa-2x text-white"></i>
        </div>
        <h4>网络拆解系统</h4>
        <p>Network Dismantling System</p>
    </div>

    <!-- 身份选择 -->
    <div class="role-selector">
        <button class="role-btn active" id="roleUser" onclick="selectRole('user')">
            <i class="fas fa-user"></i>普通用户
        </button>
        <button class="role-btn" id="roleAdmin" onclick="selectRole('superadmin')">
            <i class="fas fa-user-shield"></i>超级管理员
        </button>
    </div>

    <!-- 消息提示 -->
    <div class="alert-dark-danger" id="errorMsg">
        <i class="fas fa-exclamation-circle me-1"></i><span id="errorText"></span>
    </div>
    <div class="alert-dark-success" id="successMsg">
        <i class="fas fa-check-circle me-1"></i><span id="successText"></span>
    </div>

    <!-- 登录/注册切换（仅普通用户显示） -->
    <div class="tab-switch" id="authTabSwitch">
        <button class="active" id="tabLoginBtn" onclick="switchTab('login')">
            <i class="fas fa-sign-in-alt me-1"></i>登录
        </button>
        <button id="tabRegisterBtn" onclick="switchTab('register')">
            <i class="fas fa-user-plus me-1"></i>注册
        </button>
    </div>

    <!-- 登录表单 -->
    <div id="loginSection">
        <form id="loginForm" onsubmit="doLogin(event)">
            <div class="mb-3">
                <label class="form-label-dark">用户名</label>
                <div class="input-group input-group-dark">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control form-control-dark" id="username"
                           placeholder="请输入用户名" autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-dark">密码</label>
                <div class="input-group input-group-dark">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control form-control-dark" id="password"
                           placeholder="请输入密码" autocomplete="current-password">
                    <button type="button" class="input-group-text" style="border-left:none;cursor:pointer"
                            onclick="togglePwd()"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt me-2"></i>登 录
            </button>
        </form>
    </div>

    <!-- 注册表单 -->
    <div id="registerSection">
        <form id="registerForm" onsubmit="doRegister(event)">
            <div class="mb-3">
                <label class="form-label-dark">用户名 <span style="color:#ff8a8a">*</span></label>
                <div class="input-group input-group-dark">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control form-control-dark" id="regUsername"
                           placeholder="至少3个字符" autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-dark">密码 <span style="color:#ff8a8a">*</span></label>
                <div class="input-group input-group-dark">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control form-control-dark" id="regPassword"
                           placeholder="至少6位" autocomplete="new-password">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-dark">确认密码 <span style="color:#ff8a8a">*</span></label>
                <div class="input-group input-group-dark">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control form-control-dark" id="regConfirm"
                           placeholder="再次输入密码" autocomplete="new-password">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label-dark">邮箱（可选）</label>
                <div class="input-group input-group-dark">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control form-control-dark" id="regEmail"
                           placeholder="your@email.com" autocomplete="email">
                </div>
            </div>
            <button type="submit" class="btn-login" id="registerBtn">
                <i class="fas fa-user-plus me-2"></i>注 册
            </button>
        </form>
    </div>

    <div class="demo-hint" id="demoHint">
        <p>
            <strong>演示账号：</strong><br>
            普通用户：<strong>user1</strong> / <strong>user123</strong><br>
            超级管理员：<strong>admin</strong> / <strong>admin123</strong>
        </p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/utils/auth.js"></script>
<script>
    const SERVER_URL = 'http://localhost:5000';
    let selectedRole = 'user';
    let currentTab = 'login';

    // 已登录则直接跳转
    if (Auth.getToken()) {
        window.location.href = Auth.getRole() === 'superadmin' ? 'admin.html' : 'index.html';
    }

    function selectRole(role) {
        selectedRole = role;
        document.getElementById('roleUser').classList.toggle('active', role === 'user');
        document.getElementById('roleAdmin').classList.toggle('active', role === 'superadmin');

        // 管理员模式：隐藏注册 tab，强制切回登录
        const tabSwitch = document.getElementById('authTabSwitch');
        if (role === 'superadmin') {
            tabSwitch.style.display = 'none';
            switchTab('login');
            document.getElementById('username').value = 'admin';
            document.getElementById('password').value = 'admin123';
        } else {
            tabSwitch.style.display = 'flex';
            document.getElementById('username').value = 'user1';
            document.getElementById('password').value = 'user123';
        }
        hideMessages();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('loginSection').style.display    = tab === 'login'    ? 'block' : 'none';
        document.getElementById('registerSection').style.display = tab === 'register' ? 'block' : 'none';
        document.getElementById('demoHint').style.display        = tab === 'login'    ? 'block' : 'none';
        document.getElementById('tabLoginBtn').classList.toggle('active', tab === 'login');
        document.getElementById('tabRegisterBtn').classList.toggle('active', tab === 'register');
        hideMessages();
    }

    function togglePwd() {
        const inp = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        icon.className = inp.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = msg;
        el.style.display = 'block';
        document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        document.getElementById('successText').textContent = msg;
        el.style.display = 'block';
        document.getElementById('errorMsg').style.display = 'none';
    }

    function hideMessages() {
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }

    async function doLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>登录中...';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        try {
            const result = await Auth.login(username, password);
            if (result.success) {
                if (selectedRole === 'superadmin' && result.role !== 'superadmin') {
                    Auth.clear();
                    showError('该账号不是超级管理员');
                } else {
                    window.location.href = result.role === 'superadmin' ? 'admin.html' : 'index.html';
                    return;
                }
            } else {
                showError(result.error || '登录失败');
            }
        } catch {
            showError('无法连接服务器，请确认后端已启动');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>登 录';
    }

    async function doRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm  = document.getElementById('regConfirm').value;
        const email    = document.getElementById('regEmail').value.trim();

        if (!username || !password) { showError('用户名和密码不能为空'); return; }
        if (username.length < 3)    { showError('用户名至少3个字符'); return; }
        if (password.length < 6)    { showError('密码至少6位'); return; }
        if (password !== confirm)   { showError('两次密码输入不一致'); return; }

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>注册中...';

        try {
            const res = await fetch(`${SERVER_URL}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, email })
            });
            const data = await res.json();
            if (data.success) {
                showSuccess('注册成功！请登录');
                document.getElementById('registerForm').reset();
                setTimeout(() => switchTab('login'), 1200);
            } else {
                showError(data.error || '注册失败');
            }
        } catch {
            showError('无法连接服务器，请确认后端已启动');
        }

        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>注 册';
    }
</script>
</body>
</html>
